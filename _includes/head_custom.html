<!-- MathJax 3 — renders $...$ (inline) and $$...$$ (display) math. -->
<!-- Loaded before </head> by the minima theme's head_custom hook.    -->
<script>
  window.MathJax = {
    tex: {
      inlineMath:  [['$',  '$' ]],
      displayMath: [['$$', '$$']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
</script>
